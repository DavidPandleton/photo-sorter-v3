name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "assets/**"
      - "README.md"
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint with Ruff
        run: ruff check photosorter/ tests/

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libegl1
            
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          
      - name: Run tests (Linux Headless)
        if: runner.os == 'Linux'
        run: QT_QPA_PLATFORM=offscreen xvfb-run -a python -m pytest tests/ -v
        
      - name: Run tests (macOS/Windows Native)
        if: runner.os != 'Linux'
        run: python -m pytest tests/ -v

  build:
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libraw
      - name: Install deps
        run: |
          pip install pyinstaller
          pip install -e .
      - name: Build executable
        run: python packaging/build_windows.py
        if: runner.os == 'Windows'
      - name: Build executable (macOS)
        run: python packaging/build_windows.py
        if: runner.os == 'macOS'
      - uses: actions/upload-artifact@v4
        with:
          name: PhotoSorter-${{ runner.os }}
          path: dist/
