name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
    paths-ignore:
      - "docs/**"
      - "assets/**"
      - "README.md"
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: bun install

      - name: TypeScript & Vite Build Check
        run: bun run build

      - name: Rust Lint (Clippy)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust Unit Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  build:
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: bun install

      - name: Build Tauri App
        id: tauri
        uses: tauri-apps/tauri-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Photo Sorter ${{ github.ref_name }}"
          releaseBody: |
            **Manual culling, keyboard-fast. Zero AI.**

            ### v3.2.0 — Changes
            - **Auto Grade**: One-click auto-rate all unrated photos by sharpness (blur detection). Button in workspace.
            - **Code quality**: Remove dead clippy lint config, fix RAW_EXTENSIONS inline duplication
            - **Under the hood**: Rust clippy-clean, TypeScript-clean, all 14 tests pass

            ### Downloads
            | Platform | Asset |
            |----------|-------|
            | Windows | `-setup.exe` / `.msi` / standalone `.exe` |
            | macOS (Intel) | `.dmg` (x86_64) |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | Linux | `.deb` / `.AppImage` |
            | Source | `.zip` |

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full usage and shortcuts.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
          uploadWorkflowArtifacts: true
          uploadPlainBinary: true

      - name: Generate source code archive
        if: matrix.os == 'windows-latest'
        run: git archive --format=zip --output=source-code-${{ github.ref_name }}.zip HEAD

      - name: Upload source code to release
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG_NAME" "source-code-$TAG_NAME.zip" \
            --repo ${{ github.repository }} \
            --clobber
