name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
    paths-ignore:
      - "docs/**"
      - "assets/**"
      - "README.md"
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install dependencies
        run: bun install

      - name: TypeScript & Vite Build Check
        run: bun run build

      - name: Rust Lint (Clippy)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust Unit Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  build-windows:
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Photo Sorter ${{ github.ref_name }}"
          releaseBody: |
            **Ini Bukan Photoshop.** Keyboard-driven photo culling tool. Rate 1/2/3, export, selesai.

            ### Downloads (Windows)
            - `Photo-Sorter_3.0.0_x64_en-US.msi` — MSI installer
            - `Photo-Sorter_3.0.0_x64-setup.exe` — NSIS portable installer

            ### Cara Pake
            1. Buka folder foto
            2. Tekan `1` (BAD), `2` (OK), `3` (GOOD) tiap foto
            3. `Enter` untuk export — foto ke-sort ke folder BAD/OK/GOOD

            Lihat [README](https://github.com/${{ github.repository }}/blob/main/README.md) untuk shortcut lengkap.
          releaseDraft: true
          prerelease: false
          args: ""
