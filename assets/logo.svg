<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08080c"/>
      <stop offset="100%" stop-color="#1a1a24"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffab40"/>
      <stop offset="100%" stop-color="#ff6f00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Tumpukan foto kocak -->
  <g transform="translate(256, 260)">
    <!-- Foto 1 (paling bawah) -->
    <rect x="-120" y="-40" width="240" height="160" rx="8" fill="#2a2a35" stroke="#333" stroke-width="2" transform="rotate(-8)"/>
    <!-- Foto 2 -->
    <rect x="-120" y="-40" width="240" height="160" rx="8" fill="#22222e" stroke="#333" stroke-width="2" transform="rotate(4)"/>
    <!-- Foto 3 (depan) -->
    <rect x="-120" y="-40" width="240" height="160" rx="8" fill="#1a1a24" stroke="#2dd4bf" stroke-width="3" transform="rotate(-2)"/>

    <!-- GAMBAR DI FOTO: stick figure terong -->
    <g transform="rotate(-2)">
      <!-- Terong -->
      <ellipse cx="0" cy="20" rx="35" ry="50" fill="#4a1a7a"/>
      <ellipse cx="0" cy="20" rx="35" ry="50" fill="none" stroke="#6a2a9a" stroke-width="2"/>
      <!-- Tangkai terong -->
      <rect x="-4" y="-50" width="8" height="15" rx="3" fill="#2d5a1e"/>
      <rect x="-8" y="-35" width="16" height="6" rx="3" fill="#3a7a2e"/>
      <!-- Mahkota -->
      <polygon points="0,-55 -15,-40 -8,-45 0,-35 8,-45 15,-40" fill="#ffab40" stroke="#ff6f00" stroke-width="1"/>
      <!-- Bintang kecil -->
      <text x="-60" y="-50" font-size="20" fill="#2dd4bf" opacity="0.5">★★★</text>
      <text x="30" y="-50" font-size="12" fill="#ef4444" opacity="0.5">★</text>
    </g>
  </g>

  <!-- Rating badge BAD -->
  <g transform="translate(140, 200)">
    <circle r="28" fill="none" stroke="#ef4444" stroke-width="4" opacity="0.6"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#ef4444">1</text>
  </g>

  <!-- Rating badge GOOD -->
  <g transform="translate(372, 200)">
    <circle r="28" fill="none" stroke="#10b981" stroke-width="4" opacity="0.6"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#10b981">3</text>
  </g>

  <!-- X pada foto BAD -->
  <g transform="translate(140, 200)" opacity="0.4">
    <line x1="-18" y1="-18" x2="18" y2="18" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="-18" x2="-18" y2="18" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Centang pada foto GOOD -->
  <g transform="translate(372, 200)" opacity="0.4">
    <polyline points="-15,0 -5,10 15,-10" fill="none" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Tangan terong nunjuk -->
  <g transform="translate(180, 230)">
    <line x1="0" y1="0" x2="-30" y2="-40" stroke="#4a1a7a" stroke-width="6" stroke-linecap="round"/>
    <circle cx="-30" cy="-40" r="5" fill="#4a1a7a"/>
  </g>

  <!-- Teks "PHOTO SORTER" -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="900" letter-spacing="4" fill="#2dd4bf">PHOTO SORTER</text>

  <!-- Subtitle -->
  <text x="256" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" letter-spacing="2" fill="#475569" font-weight="600">Blazing fast photo culling</text>

  <!-- Gold star pick -->
  <text x="200" y="140" font-size="32" fill="#ffab40">★</text>
</svg>
